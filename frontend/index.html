<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAG Document Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 20px 24px;
      border-bottom: 1px solid #1e2433;
      background: #161b27;
    }
    header h1 { font-size: 1.2rem; font-weight: 600; color: #f0f4ff; }
    header p { font-size: 0.8rem; color: #64748b; margin-top: 2px; }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .message {
      max-width: 720px;
      width: 100%;
      align-self: center;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .message.user { flex-direction: row-reverse; }
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 600;
      flex-shrink: 0;
    }
    .message.user .avatar { background: #3b5bdb; color: white; }
    .message.assistant .avatar { background: #1e2433; color: #94a3b8; }
    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 0.9rem;
    }
    .message.user .bubble {
      background: #1e3a5f;
      color: #e2e8f0;
      border-radius: 12px 4px 12px 12px;
    }
    .message.assistant .bubble {
      background: #1e2433;
      color: #e2e8f0;
      border-radius: 4px 12px 12px 12px;
    }
    .message.error .bubble { background: #2d1515; color: #f87171; }
    .typing-dots {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 4px 0;
    }
    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #64748b;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }
    #input-wrap {
      padding: 16px 24px;
      border-top: 1px solid #1e2433;
      background: #161b27;
      display: flex;
      gap: 12px;
      align-items: flex-end;
      max-width: 768px;
      width: 100%;
      margin: 0 auto;
    }
    #q {
      flex: 1;
      background: #1e2433;
      border: 1px solid #2d3748;
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 0.9rem;
      padding: 12px 16px;
      resize: none;
      max-height: 120px;
      min-height: 44px;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
    }
    #q:focus { border-color: #3b5bdb; }
    #q::placeholder { color: #475569; }
    #send {
      background: #3b5bdb;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    #send:hover:not(:disabled) { background: #4c6ef5; }
    #send:disabled { background: #2d3748; color: #475569; cursor: not-allowed; }
    #welcome {
      text-align: center;
      color: #475569;
      padding: 48px 24px;
      max-width: 400px;
      margin: auto;
    }
    #welcome h2 { font-size: 1.1rem; color: #64748b; margin-bottom: 8px; }
    #welcome p { font-size: 0.85rem; line-height: 1.6; }
  </style>
</head>
<body>
  <header>
    <h1>RAG Document Assistant</h1>
    <p>Ask questions about your documents &middot; Powered by Claude + Pinecone</p>
  </header>
  <div id="messages">
    <div id="welcome">
      <h2>Ask a question</h2>
      <p>This assistant answers questions about uploaded documents using retrieval-augmented generation (RAG).</p>
    </div>
  </div>
  <div id="input-wrap">
    <textarea id="q" placeholder="Ask something about the documents..." rows="1"></textarea>
    <button id="send">Send</button>
  </div>
  <script>
    const API = 'https://gba9e7i51c.execute-api.us-east-1.amazonaws.com/';
    const box = document.getElementById('messages');
    const input = document.getElementById('q');
    const btn = document.getElementById('send');

    function addMsg(role, text, err) {
      const w = document.getElementById('welcome');
      if (w) w.remove();
      const m = document.createElement('div');
      m.className = 'message ' + role + (err ? ' error' : '');
      const av = document.createElement('div');
      av.className = 'avatar';
      av.textContent = role === 'user' ? 'You' : 'AI';
      const b = document.createElement('div');
      b.className = 'bubble';
      b.textContent = text;
      m.appendChild(av);
      m.appendChild(b);
      box.appendChild(m);
      box.scrollTop = box.scrollHeight;
    }

    function showTyping() {
      const w = document.getElementById('welcome');
      if (w) w.remove();
      const m = document.createElement('div');
      m.className = 'message assistant';
      m.id = 'typing';
      const av = document.createElement('div');
      av.className = 'avatar';
      av.textContent = 'AI';
      const b = document.createElement('div');
      b.className = 'bubble';
      b.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
      m.appendChild(av);
      m.appendChild(b);
      box.appendChild(m);
      box.scrollTop = box.scrollHeight;
    }

    function hideTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }

    async function send() {
      const q = input.value.trim();
      if (!q || btn.disabled) return;
      addMsg('user', q);
      input.value = '';
      input.style.height = 'auto';
      btn.disabled = true;
      showTyping();
      try {
        const r = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: q })
        });
        const d = await r.json();
        hideTyping();
        if (r.ok && d.answer) addMsg('assistant', d.answer);
        else addMsg('assistant', d.message || 'No answer returned.', true);
      } catch (e) {
        hideTyping();
        addMsg('assistant', 'Request failed — the service may be starting up. Try again in a moment.', true);
      } finally {
        btn.disabled = false;
        input.focus();
      }
    }

    btn.addEventListener('click', send);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = input.scrollHeight + 'px';
    });
  </script>
</body>
</html>
